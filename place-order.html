<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إتمام الطلب – المسعودي للعطور</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="site-header"></div>

<div class="page-hero">
  <h1>📦 إتمام الطلب</h1>
  <p>أكمل معلومات التوصيل لإنهاء طلبك</p>
</div>
<div class="breadcrumb-nav">
  <a href="index.html">الرئيسية</a> ← <a href="cart.html">السلة</a> ← إتمام الطلب
</div>

<div style="max-width:1000px;margin:0 auto;padding:20px;display:grid;grid-template-columns:1fr 360px;gap:24px;" id="orderLayout">

  <!-- Order Form -->
  <div class="order-form-card">
    <h3 class="order-section-title">👤 معلومات التواصل</h3>
    <div class="form-row">
      <div class="form-group">
        <label>الاسم الأول</label>
        <input type="text" id="oFirstName" placeholder="محمد">
      </div>
      <div class="form-group">
        <label>الاسم الأخير</label>
        <input type="text" id="oLastName" placeholder="المسعودي">
      </div>
    </div>
    <div class="form-group">
      <label>📞 رقم الهاتف</label>
      <input type="tel" id="oPhone" placeholder="+967 7XX XXX XXX">
    </div>
    <div class="form-group">
      <label>📧 البريد الإلكتروني (اختياري)</label>
      <input type="email" id="oEmail" placeholder="example@email.com">
    </div>

    <h3 class="order-section-title" style="margin-top:24px;">📍 عنوان التوصيل</h3>
    <div class="form-group">
      <label>المحافظة / المدينة</label>
      <select id="oCity">
        <option value="">اختر المحافظة</option>
        <option>صنعاء</option>
        <option>عدن</option>
        <option>تعز</option>
        <option>الحديدة</option>
        <option>إب</option>
        <option>المكلا</option>
        <option>سيئون</option>
        <option>ذمار</option>
        <option>حضرموت</option>
        <option>مأرب</option>
      </select>
    </div>
    <div class="form-group">
      <label>الحي / المنطقة</label>
      <input type="text" id="oArea" placeholder="مثال: حدة، الزبيري، المعلا...">
    </div>
    <div class="form-group">
      <label>تفاصيل العنوان</label>
      <input type="text" id="oAddress" placeholder="الشارع، رقم المبنى، علامة مميزة...">
    </div>

    <h3 class="order-section-title" style="margin-top:24px;">💳 طريقة الدفع</h3>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <label style="display:flex;align-items:center;gap:10px;padding:12px;border:1.5px solid #e0e0e0;border-radius:8px;cursor:pointer;">
        <input type="radio" name="payment" value="cash" checked> 💵 الدفع نقداً عند الاستلام
      </label>
      <label style="display:flex;align-items:center;gap:10px;padding:12px;border:1.5px solid #e0e0e0;border-radius:8px;cursor:pointer;">
        <input type="radio" name="payment" value="transfer"> 🏦 تحويل بنكي
      </label>
      <label style="display:flex;align-items:center;gap:10px;padding:12px;border:1.5px solid #e0e0e0;border-radius:8px;cursor:pointer;">
        <input type="radio" name="payment" value="jaib"> 📱 جيب / كاش
      </label>
    </div>

    <div class="form-group" style="margin-top:16px;">
      <label>ملاحظات إضافية (اختياري)</label>
      <textarea id="oNotes" style="width:100%;padding:10px;border:1.5px solid #e0e0e0;border-radius:8px;font-family:Tajawal,sans-serif;resize:vertical;height:80px;" placeholder="أي تعليمات خاصة للتوصيل..."></textarea>
    </div>

    <button onclick="placeOrder()" style="width:100%;padding:14px;background:linear-gradient(135deg,#28a745,#1e7e34);color:white;border-radius:30px;font-family:Tajawal,sans-serif;font-size:15px;font-weight:700;border:none;cursor:pointer;margin-top:8px;transition:all 0.2s;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''">
      ✅ تأكيد الطلب
    </button>
  </div>

  <!-- Order Summary -->
  <div>
    <div class="order-form-card" style="position:sticky;top:20px;">
      <h3 class="order-section-title">🧾 ملخص الطلب</h3>
      <div id="orderSummaryItems"></div>
      <div id="orderSummaryTotals"></div>
    </div>
  </div>

</div>

<div id="site-footer"></div>

<script src="js/products.js"></script>
<script src="js/main.js"></script>
<script>
  function renderOrderSummary() {
    const cart = getCart();
    if (cart.length === 0) { window.location.href = 'cart.html'; return; }

    const itemsHtml = cart.map(item => {
      const p = products.find(pr => pr.id === item.id);
      if (!p) return '';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px;">
        <span>${p.emoji} ${p.name} × ${item.qty}</span>
        <span style="font-weight:700;">${formatPrice(p.price * item.qty)}</span>
      </div>`;
    }).join('');

    const subtotal = getCartTotal();
    const shipping = 1500;
    const total = subtotal + shipping;

    document.getElementById('orderSummaryItems').innerHTML = itemsHtml;
    document.getElementById('orderSummaryTotals').innerHTML = `
      <div class="summary-row" style="padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px;display:flex;justify-content:space-between;"><span>المجموع الفرعي</span><span>${formatPrice(subtotal)}</span></div>
      <div class="summary-row" style="padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px;display:flex;justify-content:space-between;"><span>التوصيل</span><span>${formatPrice(shipping)}</span></div>
      <div style="padding:10px 0;display:flex;justify-content:space-between;font-size:16px;font-weight:900;color:var(--brown);"><span>الإجمالي</span><span>${formatPrice(total)}</span></div>`;
  }

  function placeOrder() {
    const phone = document.getElementById('oPhone').value.trim();
    const city = document.getElementById('oCity').value;
    if (!phone || !city) {
      showToast('يرجى ملء رقم الهاتف والمدينة على الأقل', 'error');
      return;
    }
    // Generate order number
    const orderNum = 'MSW-' + Date.now().toString().slice(-6);
    localStorage.setItem('last_order', orderNum);
    // Clear cart
    localStorage.removeItem('massoudi_cart');
    window.location.href = 'order_complete.html?order=' + orderNum;
  }

  // Handle responsive layout
  if (window.innerWidth < 768) {
    document.getElementById('orderLayout').style.gridTemplateColumns = '1fr';
  }

  document.addEventListener('DOMContentLoaded', renderOrderSummary);
</script>
</body>
</html>
