<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم – المسعودي للعطور</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="site-header"></div>

<div class="page-hero">
  <h1>👤 لوحة التحكم</h1>
  <p>مرحباً بك في حسابك الشخصي</p>
</div>
<div class="breadcrumb-nav">
  <a href="index.html">الرئيسية</a> ← لوحة التحكم
</div>

<div class="dashboard-page" id="dashContent">
  <div style="text-align:center;padding:60px;color:#888;">جاري التحميل...</div>
</div>

<div id="site-footer"></div>

<script src="js/products.js"></script>
<script src="js/main.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const user = getUser();
    if (!user) { window.location.href = 'signin.html'; return; }

    const userName = (user.firstName || user.name || 'عزيزي العميل');
    const cartCount = getCart().reduce((s, i) => s + i.qty, 0);
    const joinDate = user.createdAt ? new Date(user.createdAt).toLocaleDateString('ar-YE') : 'غير محدد';

    document.getElementById('dashContent').innerHTML = `
      <div class="dashboard-header">
        <h2>مرحباً، ${userName} 👋</h2>
        <p>📧 ${user.email || ''} &nbsp;|&nbsp; 🏙️ ${user.city || 'غير محدد'} &nbsp;|&nbsp; 📅 عضو منذ: ${joinDate}</p>
      </div>

      <div class="dashboard-grid">
        <div class="stat-card">
          <div class="stat-num">${cartCount}</div>
          <div class="stat-label">منتج في السلة</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">0</div>
          <div class="stat-label">طلبات سابقة</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">⭐</div>
          <div class="stat-label">عضو مميز</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">30%</div>
          <div class="stat-label">أقصى خصم متاح</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;" id="dashGrid">

        <!-- Account Info -->
        <div class="order-form-card">
          <h3 class="order-section-title">👤 معلومات الحساب</h3>
          <div style="display:flex;flex-direction:column;gap:12px;">
            <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:13px;">
              <span style="color:#888;">الاسم الكامل</span>
              <span style="font-weight:600;">${(user.firstName || '') + ' ' + (user.lastName || '') || user.name || 'غير محدد'}</span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:13px;">
              <span style="color:#888;">البريد الإلكتروني</span>
              <span style="font-weight:600;">${user.email || 'غير محدد'}</span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:13px;">
              <span style="color:#888;">المدينة</span>
              <span style="font-weight:600;">${user.city || 'غير محدد'}</span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:10px 0;font-size:13px;">
              <span style="color:#888;">الدولة</span>
              <span style="font-weight:600;">${user.country || 'اليمن'}</span>
            </div>
          </div>
        </div>

        <!-- Quick Links -->
        <div class="order-form-card">
          <h3 class="order-section-title">🔗 روابط سريعة</h3>
          <div style="display:flex;flex-direction:column;gap:10px;">
            <a href="store.html" style="display:flex;align-items:center;gap:10px;padding:12px;background:#f8f5f0;border-radius:8px;text-decoration:none;color:var(--text);font-size:13px;transition:background 0.2s;" onmouseover="this.style.background='#e8e0d5'" onmouseout="this.style.background='#f8f5f0'">
              🛍️ تصفح المتجر
            </a>
            <a href="cart.html" style="display:flex;align-items:center;gap:10px;padding:12px;background:#f8f5f0;border-radius:8px;text-decoration:none;color:var(--text);font-size:13px;transition:background 0.2s;" onmouseover="this.style.background='#e8e0d5'" onmouseout="this.style.background='#f8f5f0'">
              🛒 سلة التسوق (${cartCount} منتج)
            </a>
            <a href="index.html#offers" style="display:flex;align-items:center;gap:10px;padding:12px;background:#fff3dd;border-radius:8px;text-decoration:none;color:var(--text);font-size:13px;">
              ⭐ العروض الحصرية
            </a>
            <button onclick="logout()" style="display:flex;align-items:center;gap:10px;padding:12px;background:#fff0f0;border-radius:8px;text-decoration:none;color:var(--red);font-size:13px;font-family:Tajawal,sans-serif;font-weight:600;border:none;cursor:pointer;width:100%;text-align:right;">
              🚪 تسجيل الخروج
            </button>
          </div>
        </div>
      </div>

      <!-- Orders History -->
      <div class="order-form-card" style="margin-top:20px;">
        <h3 class="order-section-title">📋 سجل الطلبات</h3>
        <div style="text-align:center;padding:40px;color:#aaa;">
          <div style="font-size:2.5rem;margin-bottom:12px;">📭</div>
          <p>لا توجد طلبات سابقة بعد</p>
          <a href="store.html" style="display:inline-block;margin-top:14px;padding:10px 24px;background:var(--brown);color:white;border-radius:20px;font-size:13px;font-weight:700;">ابدأ التسوق الآن</a>
        </div>
      </div>`;

    // Responsive
    if (window.innerWidth < 768) {
      document.getElementById('dashGrid').style.gridTemplateColumns = '1fr';
    }
  });
</script>
</body>
</html>
