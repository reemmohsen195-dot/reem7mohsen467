<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سلة التسوق – المسعودي للعطور</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="site-header"></div>

<div class="page-hero">
  <h1>🛒 سلة التسوق</h1>
  <p>راجع منتجاتك قبل إتمام الطلب</p>
</div>
<div class="breadcrumb-nav">
  <a href="index.html">الرئيسية</a> ← سلة التسوق
</div>

<div class="cart-page">
  <div id="cartContent"></div>
</div>

<div id="site-footer"></div>

<script src="js/products.js"></script>
<script src="js/main.js"></script>
<script>
  function renderCart() {
    const cart = getCart();
    const container = document.getElementById('cartContent');

    if (cart.length === 0) {
      container.innerHTML = `
        <div class="empty-cart">
          <div class="icon">🛒</div>
          <h3>سلتك فارغة</h3>
          <p style="margin:10px 0 20px;">لم تضف أي منتجات بعد</p>
          <a href="store.html" style="display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#8B4513,#6B3410);color:white;border-radius:30px;font-weight:700;text-decoration:none;">تصفح المتجر</a>
        </div>`;
      return;
    }

    let tableRows = cart.map(item => {
      const p = products.find(pr => pr.id === item.id);
      if (!p) return '';
      const total = p.price * item.qty;
      return `
        <tr>
          <td>
            <div class="cart-item-placeholder ${categoryClass[p.category] || ''}">${p.emoji}</div>
          </td>
          <td><strong>${p.name}</strong></td>
          <td>${formatPrice(p.price)}</td>
          <td>
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQty(${p.id}, -1)">−</button>
              <span class="qty-num">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty(${p.id}, 1)">+</button>
            </div>
          </td>
          <td><strong>${formatPrice(total)}</strong></td>
          <td><button class="btn-remove" onclick="removeItem(${p.id})">🗑️</button></td>
        </tr>`;
    }).join('');

    const subtotal = getCartTotal();
    const shipping = 1500;
    const total = subtotal + shipping;

    container.innerHTML = `
      <div style="overflow-x:auto;">
        <table class="cart-table" style="min-width:500px;">
          <thead>
            <tr>
              <th width="70">الصورة</th>
              <th>المنتج</th>
              <th>السعر</th>
              <th>الكمية</th>
              <th>الإجمالي</th>
              <th width="50">حذف</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
      <div class="cart-summary">
        <h3 style="font-size:1.1rem;font-weight:800;margin-bottom:16px;color:var(--dark);">ملخص الطلب</h3>
        <div class="summary-row"><span>المجموع الفرعي</span><span>${formatPrice(subtotal)}</span></div>
        <div class="summary-row"><span>رسوم التوصيل</span><span>${formatPrice(shipping)}</span></div>
        <div class="summary-row total"><span>الإجمالي الكلي</span><span>${formatPrice(total)}</span></div>
        <a href="place-order.html" class="btn-checkout">✅ إتمام الطلب</a>
        <a href="store.html" style="display:block;text-align:center;margin-top:12px;color:var(--brown);font-size:13px;">← متابعة التسوق</a>
      </div>`;
  }

  function changeQty(productId, delta) {
    const cart = getCart();
    const idx = cart.findIndex(i => i.id === productId);
    if (idx < 0) return;
    cart[idx].qty += delta;
    if (cart[idx].qty <= 0) cart.splice(idx, 1);
    saveCart(cart);
    renderCart();
  }

  function removeItem(productId) {
    removeFromCart(productId);
    renderCart();
  }

  document.addEventListener('DOMContentLoaded', renderCart);
</script>
</body>
</html>
